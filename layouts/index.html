<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロジェクト報告書一覧</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            color: #24292e;
            background-color: #ffffff;
        }
        h1 {
            padding-bottom: 0.3em;
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
            margin-bottom: 24px;
        }
        /* DataTablesのカスタマイズ */
        .dataTables_wrapper {
            margin-top: 20px;
        }
        table.dataTable {
            border-collapse: collapse !important;
            border: 1px solid #dfe2e5 !important;
        }
        table.dataTable thead th {
            background-color: #f6f8fa;
            border-bottom: 2px solid #dfe2e5 !important;
            padding: 12px 15px !important;
        }
        table.dataTable td {
            padding: 12px 15px !important;
            border-bottom: 1px solid #dfe2e5;
        }
        /* ステータスの色分け */
        .status-ok { color: #28a745; font-weight: bold; }
        .status-warn { color: #f66a0a; font-weight: bold; }
        .status-crit { color: #d73a49; font-weight: bold; }
        
        /* 検索窓などの調整 */
        .dataTables_filter input {
            border: 1px solid #d1d5da;
            border-radius: 6px;
            padding: 5px 10px;
            margin-left: 10px;
        }
    </style>

    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>
<body>

    <h1>プロジェクト報告書</h1>

    <table id="reportTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th>日付</th>
                <th>種別</th>
                <th>タイトル</th>
                <th>ステータス</th>
                <th>概要</th>
            </tr>
        </thead>
        <tbody>
            {{ range .Site.Data.reports }}
            <tr>
                <td style="white-space: nowrap;">{{ .date }}</td>
                <td>{{ .type }}</td>
                <td>{{ .title }}</td>
                <td style="text-align: center;">
                    {{ if eq .status "順順調" "順調" }}<span class="status-ok">{{ .status }}</span>
                    {{ else if eq .status "一部遅延" }}<span class="status-warn">{{ .status }}</span>
                    {{ else }}<span class="status-crit">{{ .status }}</span>
                    {{ end }}
                </td>
                <td>{{ .summary }}</td>
            </tr>
            {{ end }}
        </tbody>
    </table>

        $('#reportTable').DataTable({
